services:

  # ──────────────────────────────────────────────
  # Infrastructure
  # ──────────────────────────────────────────────

  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: his-oracle
    environment:
      ORACLE_PASSWORD: ${ORACLE_SYS_PASSWORD:-oracle}
      APP_USER: HOSPITAL
      APP_USER_PASSWORD: ${DB_PASSWORD:-1111}
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 120s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: his-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-111111}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: his-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: his-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: his-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: his-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin123}; do sleep 2; done;
      /usr/bin/mc mb -p local/hospital-files || true;
      /usr/bin/mc mb -p local/staff-profile   || true;
      /usr/bin/mc mb -p local/reception-photos || true;
      exit 0;
      "

  # ──────────────────────────────────────────────
  # Microservices
  # ──────────────────────────────────────────────

  auth-service:
    build:
      context: .
      dockerfile: microservices/auth-service/Dockerfile
    container_name: his-auth
    depends_on:
      oracle-db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@//oracle-db:1521/xepdb1
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-HOSPITAL}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-1111}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-111111}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-hospital-demo-jwt-secret-key-change-me}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
    ports:
      - "8586:8586"
    restart: unless-stopped

  patient-service:
    build:
      context: .
      dockerfile: microservices/patient-service/Dockerfile
    container_name: his-patient
    depends_on:
      oracle-db:
        condition: service_healthy
      redis:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@//oracle-db:1521/xepdb1
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-HOSPITAL}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-1111}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
    ports:
      - "8181:8181"
    restart: unless-stopped

  staff-service:
    build:
      context: .
      dockerfile: microservices/staff-service/Dockerfile
    container_name: his-staff
    depends_on:
      oracle-db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@//oracle-db:1521/xepdb1
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-JCH}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-1111}
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "8022:8022"
    restart: unless-stopped

  reception-service:
    build:
      context: .
      dockerfile: microservices/reception-service/Dockerfile
    container_name: his-reception
    depends_on:
      oracle-db:
        condition: service_healthy
      redis:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@//oracle-db:1521/xepdb1
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-HOSPITAL}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-1111}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      PATIENT_SERVICE_BASE_URL: http://patient-service:8181
    ports:
      - "8283:8283"
    restart: unless-stopped

  clinical-service:
    build:
      context: .
      dockerfile: microservices/clinical-service/Dockerfile
    container_name: his-clinical
    depends_on:
      oracle-db:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@//oracle-db:1521/xepdb1
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-ssh}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-1111}
      KAFKA_BROKERS: kafka
      KAFKA_BROKER_PORT: 9092
      RECEPTION_API_BASE_URL: http://reception-service:8283
      CLINICAL_SUPPORT_API_BASE_URL: http://clinic-support-service:8189
      BILLING_API_BASE_URL: http://billing-service:8081
    ports:
      - "8090:8090"
    restart: unless-stopped

  clinic-support-service:
    build:
      context: .
      dockerfile: microservices/clinic-support-service/Dockerfile
    container_name: his-clinic-support
    depends_on:
      oracle-db:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:log4jdbc:oracle:thin:@//oracle-db:1521/xepdb1
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-HOSPITAL}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-1111}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      KAFKA_BROKERS: kafka
      KAFKA_BROKER_PORT: 9092
      INTEGRATION_CLINICAL_BASE_URL: http://clinical-service:8090
      INTEGRATION_RECEPTION_BASE_URL: http://reception-service:8283
    ports:
      - "8189:8189"
    restart: unless-stopped

  billing-service:
    build:
      context: .
      dockerfile: microservices/billing-service/Dockerfile
    container_name: his-billing
    depends_on:
      oracle-db:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@//oracle-db:1521/xepdb1
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-HOSPITAL}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-1111}
      KAFKA_BROKERS: kafka
      KAFKA_BROKER_PORT: 9092
      PATIENT_API_BASE_URL: http://patient-service:8181
      TOSS_SECRET_KEY: ${TOSS_SECRET_KEY:-}
    ports:
      - "8081:8081"
    restart: unless-stopped

volumes:
  oracle-data:
  redis-data:
  kafka-data:
  zookeeper-data:
  minio-data:
