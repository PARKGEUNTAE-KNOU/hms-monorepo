<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나쁜 UI 예시 - 휴대폰 번호 라디오 입력</title>
  <style>
    :root {
      --bg: #f6f0d8;
      --panel: #fff8e7;
      --line: #7d6a3d;
      --text: #2f2412;
      --accent: #a62c2c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Malgun Gothic", sans-serif;
      background: repeating-linear-gradient(
        45deg,
        var(--bg),
        var(--bg) 20px,
        #efe4ba 20px,
        #efe4ba 40px
      );
      color: var(--text);
    }

    .page {
      max-width: 1200px;
      margin: 24px auto;
      padding: 24px;
      border: 4px double var(--line);
      background: var(--panel);
    }

    h1 {
      margin-top: 0;
      font-size: 34px;
      line-height: 1.2;
      text-align: center;
      color: var(--accent);
      text-decoration: underline wavy;
    }

    .warning {
      margin: 16px 0 28px;
      padding: 14px;
      border: 3px dashed var(--accent);
      background: #ffe6e6;
      font-weight: 700;
      text-align: center;
    }

    .number-preview {
      position: sticky;
      top: 12px;
      z-index: 10;
      margin-bottom: 24px;
      padding: 16px;
      border: 3px solid var(--line);
      background: #fff;
      text-align: center;
    }

    .number-preview strong {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .number-preview span {
      font-size: 28px;
      letter-spacing: 3px;
      font-weight: 700;
      color: var(--accent);
    }

    .section-title {
      margin: 32px 0 14px;
      padding: 10px 12px;
      border-left: 10px solid var(--accent);
      background: #f0e6c3;
      font-size: 22px;
    }

    .digit-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
    }

    .digit-card {
      padding: 14px;
      border: 2px solid var(--line);
      background: #fffdf7;
      min-height: 360px;
    }

    .digit-card h2 {
      margin: 0 0 12px;
      font-size: 18px;
      text-align: center;
      background: #eadca7;
      padding: 8px;
      border: 1px solid var(--line);
    }

    .digit-options {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
    }

    .digit-options label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 8px;
      border: 1px solid #c4b58b;
      background: #faf3dc;
      cursor: pointer;
    }

    .digit-options input {
      transform: scale(1.2);
    }

    .submit-row {
      margin-top: 28px;
      text-align: center;
    }

    button {
      padding: 14px 28px;
      font-size: 18px;
      font-weight: 700;
      border: 3px solid #000;
      background: #ffdf5d;
      cursor: pointer;
    }

    .footnote {
      margin-top: 20px;
      font-size: 14px;
      line-height: 1.6;
      color: #5a4930;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>휴대폰 번호를 입력해 주세요</h1>
    <div class="warning">
      의도적으로 불편하게 만든 나쁜 UX 예시입니다. 각 자리를 라디오 버튼으로 하나씩 골라야 합니다.
    </div>

    <div class="number-preview">
      <strong>현재 선택된 번호</strong>
      <span id="phonePreview">___-____-____</span>
    </div>

    <form id="phoneForm">
      <div class="section-title">앞자리 3자리 선택</div>
      <div class="digit-grid" id="groupA"></div>

      <div class="section-title">가운데 4자리 선택</div>
      <div class="digit-grid" id="groupB"></div>

      <div class="section-title">마지막 4자리 선택</div>
      <div class="digit-grid" id="groupC"></div>

      <div class="submit-row">
        <button type="submit">번호 입력 완료</button>
      </div>
    </form>

    <div class="footnote">
      사용자는 총 11개의 자리를 각각 10개 선택지 중 하나로 골라야 하므로 매우 비효율적입니다.
    </div>
  </div>

  <script>
    const groups = [
      { id: "groupA", count: 3, prefix: "a" },
      { id: "groupB", count: 4, prefix: "b" },
      { id: "groupC", count: 4, prefix: "c" }
    ];

    const preview = document.getElementById("phonePreview");
    const form = document.getElementById("phoneForm");

    function createDigitCard(prefix, index) {
      const card = document.createElement("section");
      card.className = "digit-card";

      const title = document.createElement("h2");
      title.textContent = `${prefix.toUpperCase()}-${index + 1} 자리`;
      card.appendChild(title);

      const options = document.createElement("div");
      options.className = "digit-options";

      for (let digit = 0; digit <= 9; digit += 1) {
        const label = document.createElement("label");
        const input = document.createElement("input");
        const text = document.createElement("span");

        input.type = "radio";
        input.name = `${prefix}-${index}`;
        input.value = String(digit);
        input.addEventListener("change", updatePreview);

        text.textContent = `${digit} 선택`;

        label.appendChild(input);
        label.appendChild(text);
        options.appendChild(label);
      }

      card.appendChild(options);
      return card;
    }

    function mountGroups() {
      groups.forEach((group) => {
        const target = document.getElementById(group.id);
        for (let i = 0; i < group.count; i += 1) {
          target.appendChild(createDigitCard(group.prefix, i));
        }
      });
    }

    function readDigits(prefix, count) {
      const digits = [];
      for (let i = 0; i < count; i += 1) {
        const checked = document.querySelector(`input[name="${prefix}-${i}"]:checked`);
        digits.push(checked ? checked.value : "_");
      }
      return digits.join("");
    }

    function updatePreview() {
      const part1 = readDigits("a", 3);
      const part2 = readDigits("b", 4);
      const part3 = readDigits("c", 4);
      preview.textContent = `${part1}-${part2}-${part3}`;
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      alert(`제출된 번호: ${preview.textContent}`);
    });

    mountGroups();
    updatePreview();
  </script>
</body>
</html>
