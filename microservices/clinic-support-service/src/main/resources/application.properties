# =========================
# Spring Boot
# =========================
debug=true
spring.main.banner-mode=console
# DevTools LiveReload(35729) 포트 충돌 시 기동 로그에 BindException 이 찍힘 — 로컬에서 브라우저 자동 새로고침 불필요하면 끔
spring.devtools.livereload.enabled=false
spring.jackson.deserialization.fail-on-unknown-properties=true

# Spring Data JDBC: 기동 시 DB에 붙어 dialect를 조회한다. JDBC Repository를 쓰지 않으므로 비활성화(ORA-12516 등으로 연결 실패 시 부팅 중단 방지).
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.jdbc.JdbcRepositoriesAutoConfiguration

spring.application.name=hospital
server.address=0.0.0.0
server.port=8189

# IntelliJ VM 옵션 등에서 흔한 오타: nonkafka 활성 시 nokafka도 같이 켜서 application-nokafka.properties 로드
# nonkafka 단독으로도 application-nonkafka.properties 가 있으면 Kafka 없이 REST 기동에 동일하게 사용 가능
spring.profiles.group.nonkafka=nokafka


# =========================
# DataSource (Oracle XE)
# =========================
spring.datasource.url=jdbc:log4jdbc:oracle:thin:@//localhost:1521/xepdb1
spring.datasource.username=HOSPITAL
spring.datasource.password=1111
spring.datasource.driver-class-name=net.sf.log4jdbc.sql.jdbcapi.DriverSpy

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-test-query=SELECT 1 FROM DUAL
spring.datasource.hikari.pool-name=HikariPool

# =========================
# JPA
# =========================
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true

# =========================
# MyBatis
# =========================
mybatis.mapper-locations=classpath:/mapper/**/*.xml
mybatis.type-aliases-package=com.app.medical_support
mybatis.configuration.map-underscore-to-camel-case=true

# =========================
# Redis
# =========================
spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.data.redis.timeout=2000

spring.cache.type=redis

# =========================
# MinIO
# =========================
minio.internal-url=http://localhost:9000
minio.endpoint=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin123

minio.bucketStaff=staff-profile
minio.bucketPatient=hospital-files

# =========================
# SpringDoc (Swagger)

# =========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

app.storage.type=minio

# =========================

# External integration
# =========================
integration.reception.base-url=http://localhost:8283

# 진료 MSA (Treatment) — 활력·문진 프록시 대상. 환경별로 오버라이드하려면 spring.profiles.active=dev 등 + application-dev.properties 사용.
integration.clinical.base-url=http://localhost:8090
# 접수로 진료 방문 목록 (clinical_backend: GET /api/clinical?receptionId=)
integration.clinical.visits-by-reception-query-path=/api/clinical
# (레거시) 전체 목록 GET path — clinical_backend 는 미사용
integration.clinical.visits-list-path=/api/visits
# (선택) 진료에서 접수→visit 단건 API를 제공하면 여기에 전체 URL 템플릿을 넣는다. 예: http://host:8090/api/visits/by-reception/{receptionId}/visit-id
# 비우면 기존처럼 GET 방문 목록으로 receptionId 매칭 후 규칙 선택.
integration.clinical.visit-by-reception-url-template=

# 수납 claims 연동
integration.billing.claims-path=/api/billing/claims

# Kafka (Spring Cloud Stream)
# =========================
spring.cloud.stream.defaultBinder=kafka
spring.cloud.stream.default.contentType=application/json
spring.cloud.stream.function.definition=messageProcessorMedicationRecord;messageProcessorTreatmentResult;messageProcessorTestExecution
# StreamBridge 전용 출력: 논리 이름을 등록해야 output-*-out-0 채널이 생기며, 없으면 send 시 unknown.channel.name / no subscribers 발생
spring.cloud.stream.output-bindings=output-medicationRecordOutcome;output-treatmentResultOutcome;output-diagnosticExamOutcome;output-diagnosticTestResultOutcome

spring.cloud.stream.bindings.messageProcessorMedicationRecord-in-0.destination=medicationRecord
spring.cloud.stream.bindings.messageProcessorMedicationRecord-in-0.group=medicationRecordGroup
spring.cloud.stream.kafka.bindings.messageProcessorMedicationRecord-in-0.consumer.enableDlq=true
spring.cloud.stream.bindings.messageProcessorMedicationRecord-in-0.consumer.maxAttempts=3
spring.cloud.stream.bindings.messageProcessorMedicationRecord-in-0.consumer.backOffInitialInterval=500
spring.cloud.stream.bindings.messageProcessorMedicationRecord-in-0.consumer.backOffMaxInterval=1000
spring.cloud.stream.bindings.messageProcessorMedicationRecord-in-0.consumer.backOffMultiplier=2.0

spring.cloud.stream.bindings.messageProcessorTreatmentResult-in-0.destination=treatmentResult
spring.cloud.stream.bindings.messageProcessorTreatmentResult-in-0.group=treatmentResultGroup
spring.cloud.stream.kafka.bindings.messageProcessorTreatmentResult-in-0.consumer.enableDlq=true
spring.cloud.stream.bindings.messageProcessorTreatmentResult-in-0.consumer.maxAttempts=3
spring.cloud.stream.bindings.messageProcessorTreatmentResult-in-0.consumer.backOffInitialInterval=500
spring.cloud.stream.bindings.messageProcessorTreatmentResult-in-0.consumer.backOffMaxInterval=1000
spring.cloud.stream.bindings.messageProcessorTreatmentResult-in-0.consumer.backOffMultiplier=2.0

spring.cloud.stream.bindings.messageProcessorTestExecution-in-0.destination=testExecution
spring.cloud.stream.bindings.messageProcessorTestExecution-in-0.group=testExecutionGroup
spring.cloud.stream.kafka.bindings.messageProcessorTestExecution-in-0.consumer.enableDlq=true
spring.cloud.stream.bindings.messageProcessorTestExecution-in-0.consumer.maxAttempts=3
spring.cloud.stream.bindings.messageProcessorTestExecution-in-0.consumer.backOffInitialInterval=500
spring.cloud.stream.bindings.messageProcessorTestExecution-in-0.consumer.backOffMaxInterval=1000
spring.cloud.stream.bindings.messageProcessorTestExecution-in-0.consumer.backOffMultiplier=2.0

spring.cloud.stream.kafka.binder.brokers=${KAFKA_BROKERS:localhost}
spring.cloud.stream.kafka.binder.defaultBrokerPort=${KAFKA_BROKER_PORT:9092}
# clinicSupport -> Kafka (downstream: e.g. clinical UI for results, billing for exam/treatment/medication lines)
clinic-support.downstream.kafka.enabled=${CLINIC_SUPPORT_DOWNSTREAM_KAFKA_ENABLED:true}
spring.cloud.stream.bindings.output-medicationRecordOutcome-out-0.destination=medicationRecordOutcome
spring.cloud.stream.bindings.output-treatmentResultOutcome-out-0.destination=treatmentResultOutcome
spring.cloud.stream.bindings.output-diagnosticExamOutcome-out-0.destination=diagnosticExamOutcome
spring.cloud.stream.bindings.output-diagnosticTestResultOutcome-out-0.destination=diagnosticTestResultOutcome
