<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이메일 인증 코드 안내</title>
</head>
<body style="margin:0;padding:0;background:#f3f6fb;font-family:'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif;color:#1f2937;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;">
          <tr>
            <td style="padding:20px 24px;background:linear-gradient(135deg,#0b5b8f,#1f8fb4);color:#ffffff;font-size:18px;font-weight:700;">
              HIS 이메일 인증
            </td>
          </tr>
          <tr>
            <td style="padding:24px;">
              <p style="margin:0 0 12px 0;font-size:14px;line-height:1.6;">아래 인증 코드를 입력해 인증을 완료해 주세요.</p>
              <div style="margin:14px 0 16px 0;padding:16px 18px;border:1px dashed #94a3b8;border-radius:10px;background:#f8fafc;text-align:center;">
                <span style="font-size:28px;font-weight:800;letter-spacing:4px;" th:text="${code}">000000</span>
              </div>
              <p style="margin:0;font-size:13px;color:#475569;">유효시간: <strong th:text="${ttlMinutes}">5</strong>분</p>
              <p style="margin:16px 0 0 0;font-size:12px;color:#64748b;line-height:1.6;">본인이 요청하지 않은 경우 이 메일은 무시하셔도 됩니다.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
