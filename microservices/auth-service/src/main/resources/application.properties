# =========================
# Spring Boot
# =========================
debug=false
spring.main.banner-mode=console
spring.devtools.restart.log-condition-evaluation-delta=false

spring.application.name=hospital
server.address=0.0.0.0
server.port=8586
app.jwt.secret=${APP_JWT_SECRET:hospital-demo-jwt-secret-key-change-me-2026-hospital}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:28800000}
app.jwt.refresh-expiration-ms=${APP_JWT_REFRESH_EXPIRATION_MS:1209600000}

# =========================
# DataSource (Oracle XE)
# =========================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:log4jdbc:oracle:thin:@//localhost:1521/xepdb1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:hospital}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1111}
spring.datasource.driver-class-name=net.sf.log4jdbc.sql.jdbcapi.DriverSpy

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-test-query=SELECT 1 FROM DUAL
spring.datasource.hikari.pool-name=HikariPool

# =========================
# JPA
# =========================
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true

# =========================
# MyBatis
# =========================
mybatis.mapper-locations=classpath:/mapper/**/*.xml
mybatis.type-aliases-package=app.patient
mybatis.configuration.map-underscore-to-camel-case=true

# =========================
# Redis
# =========================
#spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
#spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
#spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:111111}
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:111111}
spring.data.redis.timeout=2000

spring.cache.type=${SPRING_CACHE_TYPE:redis}

