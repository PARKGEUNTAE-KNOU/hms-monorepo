# =========================
# SpringDoc (Swagger)
# =========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

app.storage.type=${APP_STORAGE_TYPE:none}

# =========================
# Mail (email verification)
# =========================
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.verify.email.mock=${APP_VERIFY_EMAIL_MOCK:false}
app.verify.sms.mock=${APP_VERIFY_SMS_MOCK:false}
app.verify.sms.provider=${APP_VERIFY_SMS_PROVIDER:solapi}
app.verify.sms.provider-url=${APP_VERIFY_SMS_PROVIDER_URL:https://api.solapi.com/messages/v4/send}
app.verify.sms.provider-auth-token=${APP_VERIFY_SMS_PROVIDER_AUTH_TOKEN:}
app.verify.sms.solapi.api-key=${APP_VERIFY_SMS_SOLAPI_API_KEY:NCSA7PMWW6LMQC0O}
app.verify.sms.solapi.api-secret=${APP_VERIFY_SMS_SOLAPI_API_SECRET:QCOAUNJL1BELFVT68BL2IVQTSZMZFMH0}
app.verify.sms.sender=${APP_VERIFY_SMS_SENDER:01031534297}
app.verify.sms.message-template=${APP_VERIFY_SMS_MESSAGE_TEMPLATE:[HMS] 인증번호는 %s 입니다.}

# =========================
# OAuth2 (Google / Naver / Kakao)
# =========================
spring.security.oauth2.client.registration.google.client-id=${OAUTH_GOOGLE_CLIENT_ID:disabled-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${OAUTH_GOOGLE_CLIENT_SECRET:disabled-google-client-secret}
spring.security.oauth2.client.registration.google.redirect-uri=${OAUTH_GOOGLE_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}
spring.security.oauth2.client.registration.google.scope=profile,email

spring.security.oauth2.client.registration.naver.client-id=${OAUTH_NAVER_CLIENT_ID:TjnpPa2i924F5dD_NnO_}
spring.security.oauth2.client.registration.naver.client-secret=${OAUTH_NAVER_CLIENT_SECRET:aJdIxkFFOH}
spring.security.oauth2.client.registration.naver.client-authentication-method=post
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.redirect-uri=${OAUTH_NAVER_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}
spring.security.oauth2.client.registration.naver.scope=name,email
spring.security.oauth2.client.registration.naver.client-name=Naver
spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response

spring.security.oauth2.client.registration.kakao.client-id=${OAUTH_KAKAO_CLIENT_ID:disabled-kakao-client-id}
spring.security.oauth2.client.registration.kakao.client-secret=${OAUTH_KAKAO_CLIENT_SECRET:disabled-kakao-client-secret}
spring.security.oauth2.client.registration.kakao.client-authentication-method=post
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri=${OAUTH_KAKAO_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,account_email
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth2.0/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

app.oauth.redirect-success=${APP_OAUTH_REDIRECT_SUCCESS:}
app.oauth.redirect-failure=${APP_OAUTH_REDIRECT_FAILURE:}
app.oauth.auto-create=${APP_OAUTO_CREATE:false}

app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:*}

app.auth.cookie-max-age-seconds=${APP_AUTH_COOKIE_MAX_AGE_SECONDS:43200}
app.auth.refresh-cookie-max-age-seconds=${APP_AUTH_REFRESH_COOKIE_MAX_AGE_SECONDS:1209600}
app.auth.cookie-secure=${APP_AUTH_COOKIE_SECURE:false}
app.auth.session.idle-seconds=${APP_AUTH_SESSION_IDLE_SECONDS:7200}
app.auth.session.absolute-seconds=${APP_AUTH_SESSION_ABSOLUTE_SECONDS:1209600}

app.certificate.secret=${APP_CERTIFICATE_SECRET:${APP_JWT_SECRET:hospital-demo-jwt-secret-key-change-me-2026-hospital}}
app.certificate.verify-base-url=${APP_CERTIFICATE_VERIFY_BASE_URL:http://localhost:8081/api/jpa/training/certificates/verify}
