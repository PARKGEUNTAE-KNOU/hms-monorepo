server.port=8283

# =========================
# JPA
# =========================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# =========================

#spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/xepdb1
##spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/xepdb1
#spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/xepdb1
#spring.datasource.username=hospital
#spring.datasource.password=1111

spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/xepdb1
spring.datasource.username=hospital
spring.datasource.password=1111
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# =========================
# MyBatis
# =========================
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=kr.co.seoulit.reception.outpatient.dto,kr.co.seoulit.reception.reservation.dto,kr.co.seoulit.reception.emergency.dto,kr.co.seoulit.reception.inpatient.dto
mybatis.configuration.map-underscore-to-camel-case=true

# =========================
# Logging
# =========================
logging.level.kr.co.seoulit.reception=info
logging.level.org.mybatis=info
logging.level.kr.co.seoulit.common=info
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=trace

# =========================
# Redis
# =========================
spring.cache.type=simple
spring.data.redis.host=localhost
spring.data.redis.port=6379

# =========================
# Swagger (Springdoc)
# =========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# =========================
# Uploads
# =========================
file.upload-dir=uploads

# =========================
# MinIO
# =========================
minio.endpoint=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket=reception-photos
# If you expose MinIO via a reverse proxy or public URL, set it here.
# minio.public-url=https://minio.example.com

# =========================
# External services
# =========================
patient-service.base-url=${PATIENT_SERVICE_BASE_URL:http://localhost:8181}






