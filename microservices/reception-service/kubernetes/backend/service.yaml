apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: reception
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: hyojeong7/reception-backend:v42
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8181
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/reception?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              value: "1111"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: reception
spec:
  selector:
    app: backend
  ports:
    - port: 8181
      targetPort: 8181
  type: LoadBalancer
